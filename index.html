<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match Reviews</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0f14;color:#dde1f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:40px 20px;max-width:620px;margin:0 auto;line-height:1.5}
a{text-decoration:none;color:inherit}
.queue-card{background:#16181f;border:1px solid #2a2d3a;border-radius:12px;padding:20px 24px;margin-bottom:12px;transition:border-color .2s,background .2s;cursor:pointer;display:block}
.queue-card:hover{border-color:#3a3d4a;background:#1a1c24}
.queue-card:hover .arrow{transform:translateX(3px)}
.queue-label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a4d5a;font-weight:600;margin-bottom:6px}
.queue-title{font-size:1.1rem;font-weight:700;margin-bottom:10px;letter-spacing:-.01em}
.queue-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.record-badge{display:inline-flex;gap:8px;align-items:center;background:#0e0f14;border:1px solid #2a2d3a;border-radius:6px;padding:4px 10px;font-size:.78rem}
.queue-sub{color:#4a4d5a;font-size:.72rem}
.queue-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid #1e2029}
.session-chip{display:flex;align-items:center;gap:8px}
.session-dot{width:6px;height:6px;border-radius:50%;background:#3dca7e}
.session-text{font-size:.75rem;color:#7b8099}
.arrow{color:#4a4d5a;font-size:.8rem;transition:transform .2s}
</style>
</head>
<body>

<div style="margin-bottom:32px">
  <div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#4a4d5a;font-weight:600;margin-bottom:8px">Post-Match Reviews</div>
  <h1 style="font-size:1.6rem;font-weight:700;letter-spacing:-.02em;line-height:1.2">League of Legends<br><span style="color:#c89b3c">Coaching Reports</span></h1>
</div>

<a class="queue-card" href="flex.html">
  <div class="queue-label">Flex Queue</div>
  <div class="queue-title">Flex Queue Reports</div>
  <div class="queue-meta">
    <div class="record-badge">
      <span style="color:#3dca7e;font-weight:700">4W</span>
      <span style="color:#2a2d3a">·</span>
      <span style="color:#e55c5c;font-weight:700">1L</span>
    </div>
    <span class="queue-sub">5 games · Patch 16.7</span>
  </div>
  <div class="queue-card-footer">
    <div class="session-chip">
      <div class="session-dot"></div>
      <span class="session-text">April 10–11, 2026</span>
    </div>
    <span class="arrow">→</span>
  </div>
</a>

<a class="queue-card" href="solo.html">
  <div class="queue-label">Solo/Duo Queue</div>
  <div class="queue-title">Solo Queue Reports</div>
  <div class="queue-meta">
    <div class="record-badge">
      <span style="color:#3dca7e;font-weight:700">2W</span>
      <span style="color:#2a2d3a">·</span>
      <span style="color:#e55c5c;font-weight:700">3L</span>
    </div>
    <span class="queue-sub">5 games · Patch 16.7</span>
  </div>
  <div class="queue-card-footer">
    <div class="session-chip">
      <div class="session-dot" style="background:#e55c5c"></div>
      <span class="session-text">April 8, 2026</span>
    </div>
    <span class="arrow">→</span>
  </div>
</a>

</body>
</html>
